// Q6= Write a program to take input the marks obtained in three 
// subjects & total marks. Compute & show the resulting 
// percentage on your page. Take percentage & compute 
// grade as per following table:
//  percentage%           Grade           Remarks
// greater than or = 80   A-one           Exellent     
// greater than or = 70     A              Good
// greater than or = 60     B           You need to improve   
// less than 60            Fail           Sorry
// Show the total marks, marks obtained, percentage, grade & 
// remarks like:
//  ... ... ... ... ... ...

var totalMarks = +prompt("Enter Total Marks");

var sub1 = +prompt("Enter marks of subject 1");
var sub2 = +prompt("Enter marks of subject 2");
var sub3 = +prompt("Enter marks of subject 3");

var obtainedMarks = sub1 + sub2 + sub3;
var percentage = (obtainedMarks / totalMarks) * 100;

var grade, remarks;

if (percentage >= 80) {
    grade = "A-one";
    remarks = "Exellent";
}
else if (percentage >= 70) {
    grade = "A";
    remarks = "Good";
}
else if (percentage >= 60) {
    grade = "B";
    remarks = "You need to improve";
}
else {
    grade = "Fail";
    remarks = "Sorry";
}

document.write("<h1>Marks Sheet</h1>");
document.write("Toal marks : " + totalMarks + "<br>");
document.write("Marks obtained : " + obtainedMarks + "<br>");
document.write("Percentage : " + percentage + "<br>");
document.write("Grade : " + grade + "<br>");
document.write("Remarks : " + remarks + "<br>");


// Q7= Guess game:

// Prompt user to guess the secret number. 
// a. If user guesses the same number, show “Bingo! Correct 
// answer”. 
// b. If the guessed number +1 is the secret number, show 
// “Close enough to the correct answer”. 

var seceretNumber = 2;
var guess = +prompt("Guess the seceret number b/w (1 to 10)");

if (guess === seceretNumber) {
    alert("Bingo! Correct answer");
}
else if (guess + 1 === seceretNumber) {
    alert("Close enough to the correct answer");   
}
else {
    alert("Incorrect answer, Better Luck Next Time");
}


// Q8= Write a program to check whether the given number is 
// divisible by 3. Show the message to the user if the number 
// is divisible by 3.

    alert(number + " is divisible by 3.");
}
else {
    alert(number + " is not divisible by 3.");
}

// Q11= Write a program to create a calculator for +,-,*, / & % 
// using if statements. Take the following input: 
// a. First number 
// b. Second number 
// c. Operation (+, -, *, /, %) 
// Compute & show the calculated result to user.

var num1 = +prompt("Enter the first number:");
var num2 = +prompt("Enter the second number:");
var operation = prompt("Enter the operation (+, -, *, /, %):");

if (operation == "+") {
    alert("Result: " + (num1 + num2));
}

if (operation == "-") {
    alert("Result: " + (num1 - num2));
}

if (operation == "*") {
    alert("Result: " + (num1 * num2));
}

if (operation == "/") {
    alert("Result: " + (num1 / num2));
}

if (operation == "%") {
    alert("Result: " + (num1 % num2));
}
